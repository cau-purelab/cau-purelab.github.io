# 매주 Google Sites/Scholar를 대조해 논문 데이터 변경을 감지하고,
# 변경이 있으면 자동으로 PR을 생성한다 (main 직접 push = 즉시 배포이므로 PR로 검토 후 머지).
#
# 주의: Google Scholar가 GitHub Actions IP를 차단(429/403)하면 이 워크플로우는 실패할 수 있음.
# 그 경우 로컬에서 `node scripts/sync_scholar.cjs --apply`를 수동 실행할 것.
name: Weekly Scholar Sync

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 09:00 KST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 스크립트는 node 내장 모듈만 사용하므로 npm install 불필요
      - name: Run scholar sync (apply)
        run: |
          node scripts/sync_scholar.cjs --apply | tee "$RUNNER_TEMP/sync-report.txt"
          node scripts/update_scholar_metrics.cjs

      - name: Validate data
        run: node scripts/validate_data.cjs

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            src/data/publications.json
            src/constants.tsx
          commit-message: 'Weekly scholar data sync'
          title: 'Weekly scholar data sync'
          body-path: ${{ runner.temp }}/sync-report.txt
          branch: auto/scholar-sync
          delete-branch: true
